# Static analysis for AQI.me — tuned for a zero-warning release gate.
# `flutter analyze` must be clean before anything ships (see TECH_DESIGN §14).

include: package:flutter_lints/flutter.yaml

analyzer:
  # Treat these as hard errors so they can't slip past `flutter analyze`.
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Warnings are not acceptable in a release build — promote the important ones.
    missing_required_param: error
    missing_return: error
    todo: ignore
  exclude:
    # Generated code (freezed / json_serializable) — not ours to lint.
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # Style consistency
    prefer_single_quotes: true
    always_use_package_imports: true
    directives_ordering: true
    prefer_relative_imports: false

    # Safety / correctness
    require_trailing_commas: true
    avoid_dynamic_calls: true
    unawaited_futures: true
    cancel_subscriptions: true
    close_sinks: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true

    # Docs on public API of the core library
    # (kept light; not requiring docs on every member)
    prefer_typing_uninitialized_variables: true
