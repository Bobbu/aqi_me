<!DOCTYPE html>
<html>

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">

  <meta property="og:site_name" content="AQI Me">
  <meta property="og:title" content="AQI Me — Air quality at a glance">

  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="AQI Me — a cloud with a bar chart forming a smile">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AQI Me — Air quality at a glance">
  <meta name="twitter:description" content="Track current Air Quality Index for up to 20 locations. No account, no install.">
  <meta name="twitter:image" content="https://aqi-me.anystupididea.com/og-image.png">

  <!-- iOS meta tags & icons -->

  <link rel="manifest" href="manifest.json">
