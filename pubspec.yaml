name: aqi_me
description: "Track current AQI for up to 20 locations."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Networking (Open-Meteo — key-less, CORS-enabled)
  dio: ^5.7.0

  # Local, per-device persistence of the location list
  shared_preferences: ^2.3.3

  # Typography (see lib/core/theme.dart). NOTE: google_fonts fetches font files at
  # runtime by default; before release we bundle these as assets so the only outbound
  # calls are to Open-Meteo (see TECH_DESIGN §15 / open questions).
  google_fonts: ^6.2.1

  # Immutable models + JSON (annotations; codegen via build_runner in dev_dependencies)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation for freezed / json_serializable
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
