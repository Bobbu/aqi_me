name: aqi_me
description: "Track current AQI for up to 20 locations."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Networking (Open-Meteo — key-less, CORS-enabled)
  dio: ^5.7.0

  # Local, per-device persistence of the location list
  shared_preferences: ^2.3.3

  # Immutable models + JSON (annotations; codegen via build_runner in dev_dependencies)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8

  # IANA tz database — derive named zone abbreviations (EDT, CDT, JST…) that
  # Open-Meteo doesn't provide. Bundled data, no network.
  timezone: ^0.11.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation for freezed / json_serializable
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/aqi_me_logo.png
  # Bundled fonts (OFL) — kept local so the only outbound calls are to Open-Meteo
  # (TECH_DESIGN §15). Space Grotesk and Inter are variable fonts; Flutter maps
  # FontWeight onto the wght axis.
  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
